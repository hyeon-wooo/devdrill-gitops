apiVersion: v1
kind: PersistentVolume
metadata:
  name: px-pv
spec:
  capacity:
    storage: 10Gi
  storageClassName: px-storage
  # 여러 노드 및 파드에서 동시에 RW 가능
  accessModes:
    - ReadWriteMany
  nfs:
    path: /share/px
    server: 10.10.10.51
  # PVC 삭제 후에도 데이터 유지
  persistentVolumeReclaimPolicy: Retain
