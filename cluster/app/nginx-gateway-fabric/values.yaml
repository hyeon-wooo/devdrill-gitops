service:
  type: NodePort

nginxGateway:
  replicaCount: 3

# 노드 당 Pod 1개 강제
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/instance
              operator: In
              values:
                - ngf # helm release 이름
        topologyKey: "kubernetes.io/hostname"

tolerations:
  - key: dedicated
    operator: Exists
