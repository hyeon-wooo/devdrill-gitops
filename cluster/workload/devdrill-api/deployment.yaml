apiVersion: apps/v1
kind: Deployment
metadata:
  name: devdrill-api
  namespace: devdrill-prod
  labels:
    app: devdrill
    tier: api
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devdrill
      tier: api
      env: prod
  template:
    metadata:
      labels:
        app: devdrill
        tier: api
        env: prod
    spec:
      nodeSelector:
        dedicated: devdrill
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "devdrill"
      topologySpreadConstraints:
        - maxSkew: 1
          whenUnsatisfiable: ScheduleAnyway
          topologyKey: "kubernetes.io/hostname"
          labelSelector:
            matchLabels:
              app: devdrill
              tier: api
              env: prod
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: devdrill-api
          image: docker.hyeonwoo.com/devdrill/devdrill-api:sha-9c80139
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: api-data
              mountPath: /app/data
          envFrom:
            - configMapRef:
                name: devdrill-api-cm
            - secretRef:
                name: devdrill-api-secret
          resources:
            limits:
              cpu: 500m
            requests:
              cpu: 30m
      volumes:
        - name: api-data
          persistentVolumeClaim:
            claimName: devdrill-pvc
      readinessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 3 # 앱이 뜨는 시간을 고려해 3초 후부터 검사
        periodSeconds: 10 # 10초마다 반복 검사
      livenessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 15 # Liveness는 좀 더 여유 있게 시작
        periodSeconds: 20
